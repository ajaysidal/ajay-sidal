<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Request A Demo — Build With AI</title><link rel="icon" href="/favicon.ico"/><style>body{font-family:Inter,system-ui,Arial;margin:40px;color:#071029}form{max-width:700px}</style></head><body><h1>Request A Demo</h1><p>Schedule a private demo with our team to see the platform and roadmap.</p><form id="demo" onsubmit="return submitDemo(event)"><input id="dname" placeholder="Your name" required style="width:100%;padding:8px"/><br/><input id="demail" placeholder="work@company.com" required style="width:100%;padding:8px;margin-top:8px"/><br/><input id="dcompany" placeholder="Company" style="width:100%;padding:8px;margin-top:8px"/><br/><textarea id="dnotes" placeholder="Notes or preferred times" style="width:100%;padding:8px;margin-top:8px" rows="4"></textarea><br/><button type="submit" style="margin-top:8px">Request Demo</button></form><script>async function submitDemo(e){e.preventDefault();alert('Thanks — your demo request has been received. We will contact you.');}</script></body></html>
