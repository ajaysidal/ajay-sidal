name: Playwright Repro CI

on:
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start server (background)
        run: |
          SKIP_HTTPS_REDIRECT=1 npm run start > next-server.log 2>&1 & echo $! > server.pid
      - name: Wait for server
        run: |
          n=0; until curl -sSf http://localhost:3000/ >/dev/null 2>&1 || [ $n -ge 30 ]; do n=$((n+1)); sleep 1; done
      - name: Run Playwright repro test
        run: |
          npx playwright test e2e/repro-nextauth.spec.ts --reporter=list || true
      - name: Collect server logs
        run: |
          tail -n 500 next-server.log || true
      - name: Kill server
        run: |
          kill "$(cat server.pid)" || true
